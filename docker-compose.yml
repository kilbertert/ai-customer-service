# ============================================
# Basjoo Docker Compose 配置
# 使用 Profile 区分环境：
#   - 生产: docker compose --profile prod up -d
#   - 开发: docker compose --profile dev up -d
# ============================================

services:
  # ============================================
  # 基础设施服务 (所有环境共用)
  # ============================================
  redis:
    image: redis:7-alpine
    container_name: basjoo-redis
    command: redis-server --appendonly yes
    volumes:
      - redis-data:/data
    ports:
      - "127.0.0.1:6379:6379"
    restart: unless-stopped
    networks:
      - basjoo-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    profiles: ["prod", "dev"]

  postgres:
    image: pgvector/pgvector:pg16
    container_name: basjoo-postgres
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=postgres
    volumes:
      - postgres-data:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:5433:5432"  # host 5433 → container 5432 (avoid host PG port conflict, 2026-06-14)
    restart: unless-stopped
    networks:
      - basjoo-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    command: postgres -c max_connections=1024
    profiles: ["prod", "dev"]

  qdrant:
    image: qdrant/qdrant:latest
    container_name: basjoo-qdrant
    ports:
      - "127.0.0.1:6333:6333"
    volumes:
      - qdrant-data:/qdrant/storage
    restart: unless-stopped
    networks:
      - basjoo-network
    healthcheck:
      # Qdrant image has bash but no curl; probe /readyz via bash TCP.
      test:
        - CMD
        - bash
        - -lc
        - >-
          exec 3<>/dev/tcp/localhost/6333;
          printf 'GET /readyz HTTP/1.1\r\nHost: localhost\r\n\r\n' >&3;
          timeout 5 grep -q '200 OK' <&3
      interval: 10s
      timeout: 5s
      retries: 5
    profiles: ["prod", "dev"]

  scrapling-service:
    build:
      context: ./scrapling-service
      dockerfile: Dockerfile
    container_name: basjoo-scrapling
    restart: unless-stopped
    networks:
      - basjoo-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 30s
    profiles: ["prod", "dev"]

  # ============================================
  # 生产环境服务
  # ============================================
  backend-prod:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: basjoo-backend
    environment:
      - DATABASE_URL=sqlite:////app/data/basjoo.db
      - REDIS_URL=redis://redis:6379/0
      - QDRANT_URL=http://qdrant:6333
      - SECRET_KEY=${SECRET_KEY:-}
      - SECRET_KEY_FILE=${SECRET_KEY_FILE:-/app/data/.secret_key}
      - DEFAULT_AGENT_ID=${DEFAULT_AGENT_ID:-}
      - REQUIRE_SECRET_KEY=${REQUIRE_SECRET_KEY:-true}
      - "ALLOWED_ORIGINS=${ALLOWED_ORIGINS:-}"
      - "ALLOWED_METHODS=${ALLOWED_METHODS:-GET,POST,PUT,DELETE,OPTIONS}"
      - "ALLOWED_HEADERS=${ALLOWED_HEADERS:-Content-Type,Authorization,X-Requested-With,Accept}"
      - DEFAULT_RATE_LIMIT=1000
      - DEEPSEEK_API_KEY=${DEEPSEEK_API_KEY:-}
      - JINA_API_KEY=${JINA_API_KEY:-}
      - ENCRYPTION_KEY=${ENCRYPTION_KEY:-}
      - ENCRYPTION_KEY_FILE=${ENCRYPTION_KEY_FILE:-/app/data/.encryption_key}
      - RATE_LIMIT_PER_MINUTE=${RATE_LIMIT_PER_MINUTE:-1000}
      - RATE_LIMIT_BURST_SIZE=${RATE_LIMIT_BURST_SIZE:-200}
      - LOG_LEVEL=INFO
      - SCRAPLING_SERVICE_URL=http://scrapling-service:8001
    volumes:
      - backend-data:/app/data
    depends_on:
      redis:
        condition: service_healthy
      qdrant:
        condition: service_healthy
      scrapling-service:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - basjoo-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    profiles: ["prod"]

  frontend-prod:
    build:
      context: ./frontend-nextjs
      dockerfile: Dockerfile
      args:
        BACKEND_PROXY_TARGET: http://backend-prod:8000
    container_name: basjoo-frontend
    restart: unless-stopped
    networks:
      - basjoo-network
    environment:
      - NEXT_PUBLIC_API_BASE_URL=
      - BACKEND_PROXY_TARGET=http://backend-prod:8000
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:3000"]
      interval: 30s
      timeout: 10s
      retries: 3
    profiles: ["prod"]
    depends_on:
      - backend-prod

  nginx:
    build:
      context: ./nginx
      dockerfile: Dockerfile
    container_name: basjoo-nginx
    environment:
      - SERVER_DOMAIN=${SERVER_DOMAIN:-}
    ports:
      - "80:8080"
      - "443:8443"
    volumes:
      - ./ssl:/etc/nginx/ssl:ro
    depends_on:
      backend-prod:
        condition: service_healthy
      frontend-prod:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - basjoo-network
    profiles: ["prod"]

  # ============================================
  # 开发环境服务
  # ============================================
  backend-dev:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    container_name: basjoo-backend-dev
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=sqlite:////app/data/basjoo.db
      - REDIS_URL=redis://redis:6379/0
      - QDRANT_URL=http://qdrant:6333
      - SECRET_KEY=${SECRET_KEY:-dev-secret-key}
      - SECRET_KEY_FILE=${SECRET_KEY_FILE:-/app/data/.secret_key}
      - DEFAULT_AGENT_ID=${DEFAULT_AGENT_ID:-}
      - ALLOWED_ORIGINS=*
      - ALLOWED_METHODS=GET,POST,PUT,DELETE,OPTIONS
      - ALLOWED_HEADERS=Content-Type,Authorization,X-Requested-With,Accept
      - DEFAULT_RATE_LIMIT=10000
      - DEEPSEEK_API_KEY=${DEEPSEEK_API_KEY:-}
      - JINA_API_KEY=${JINA_API_KEY:-}
      - ENCRYPTION_KEY=${ENCRYPTION_KEY:-}
      - ENCRYPTION_KEY_FILE=${ENCRYPTION_KEY_FILE:-/app/data/.encryption_key}
      - RATE_LIMIT_PER_MINUTE=${RATE_LIMIT_PER_MINUTE:-1000}
      - RATE_LIMIT_BURST_SIZE=${RATE_LIMIT_BURST_SIZE:-200}
      - LOG_LEVEL=DEBUG
      - SCRAPLING_SERVICE_URL=http://scrapling-service:8001
      # M11 PR3 — Dify 集成层 (Plan B 全局默认)
      - DIFY_API_BASE=${DIFY_API_BASE:-}
      - DIFY_ADMIN_EMAIL=${DIFY_ADMIN_EMAIL:-}
      - DIFY_ADMIN_PASSWORD=${DIFY_ADMIN_PASSWORD:-}
      # M11 PR3 — Dify 集成层 (Plan B 全局默认)
      - DIFY_API_BASE=${DIFY_API_BASE:-}
      - DIFY_ADMIN_EMAIL=${DIFY_ADMIN_EMAIL:-}
      - DIFY_ADMIN_PASSWORD=${DIFY_ADMIN_PASSWORD:-}
    volumes:
      - backend-data:/app/data
      - ./backend:/app
    depends_on:
      redis:
        condition: service_healthy
      qdrant:
        condition: service_healthy
      scrapling-service:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - basjoo-network
    entrypoint: ["python3", "/app/docker-entrypoint.py"]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    profiles: ["dev"]
    develop:
      watch:
        - path: ./backend
          target: /app
          action: sync
          ignore:
            - __pycache__/
            - "*.pyc"
            - .pytest_cache/
            - venv/
            - data/
            - .git/
        - path: ./backend/requirements.txt
          action: rebuild

  frontend-dev:
    build:
      context: ./frontend-nextjs
      dockerfile: Dockerfile.dev
    container_name: basjoo-frontend-dev
    ports:
      - "3001:3000"  # host 3001 → container 3000 (avoid host port 3000 conflict with NeteaseCloudMusicApi, 2026-06-14)
    environment:
      - NEXT_PUBLIC_API_BASE_URL=
      - NEXT_PUBLIC_WS_BASE_URL=
      - BACKEND_PROXY_TARGET=http://backend-dev:8000
    volumes:
      - ./frontend-nextjs:/app
      - /app/node_modules
    depends_on:
      - backend-dev
    restart: unless-stopped
    networks:
      - basjoo-network
    profiles: ["dev"]
    develop:
      watch:
        - path: ./frontend-nextjs
          target: /app
          action: sync
          ignore:
            - node_modules/
            - .next/
        - path: ./frontend-nextjs/package.json
          action: rebuild

  # ============================================
  # Widget cross-origin test host services
  # ============================================
  allowed-host:
    image: nginx:alpine
    container_name: basjoo-allowed-host
    profiles: ["dev", "prod"]
    volumes:
      - ./tests/environments/host-pages/allowed-host:/usr/share/nginx/html:ro
      - ./tests/environments/host-pages/nginx-allowed.conf:/etc/nginx/conf.d/default.conf:ro
    ports:
      - "8080:80"
    restart: unless-stopped
    networks:
      - basjoo-network

  blocked-host:
    image: nginx:alpine
    container_name: basjoo-blocked-host
    profiles: ["dev", "prod"]
    volumes:
      - ./tests/environments/host-pages/blocked-host:/usr/share/nginx/html:ro
      - ./tests/environments/host-pages/nginx-blocked.conf:/etc/nginx/conf.d/default.conf:ro
    ports:
      - "8081:80"
    restart: unless-stopped
    networks:
      - basjoo-network

  # ============================================
  # Dify 平台服务 (M10+5 opt-in, 沙箱不默认起)
  # 启动: docker compose --profile dify up -d
  # 镜像 ~3GB, 拉取慢 — 生产建议独立 docker-compose 部署 Dify
  # ============================================
  dify:
    image: langgenius/dify-api:1.14.2
    container_name: basjoo-dify
    profiles: ["dify"]   # 显式 opt-in, 不进 dev/prod 默认起
    ports:
      - "8501:5001"  # host 8501 → container 5001 (Dify API default), 跟沙箱真 Dify 端口对齐
    environment:
      # 复用本仓 postgres (独立 database: dify)
      - DB_USERNAME=postgres
      - DB_PASSWORD=postgres
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_DATABASE=dify
      # 复用本仓 redis (DB 1, 跟 basjoo 0 隔离)
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=
      - REDIS_DB=1
      # 复用本仓 qdrant 作 vector DB (Dify 1.14.2 支持 qdrant)
      - VECTOR_STORE=qdrant
      - QDRANT_URL=http://qdrant:6333
      - QDRANT_API_KEY=
      # 初次启动跑 migrations
      - MIGRATION_ENABLED=true
      # URLs (跟 basjoo 同源, 反代通过 nginx)
      - CONSOLE_API_URL=http://localhost:8501
      - CONSOLE_WEB_URL=http://localhost:8501
      - SERVICE_API_URL=http://localhost:8501/v1
      - APP_API_URL=http://localhost:8501/v1
      # Secret — 部署时通过 .env 注入
      - SECRET_KEY=${DIFY_SECRET_KEY:-dify-dev-secret-change-me}
      # Storage (本地)
      - STORAGE_TYPE=local
      - STORAGE_LOCAL_PATH=/app/api/storage
    volumes:
      - dify-data:/app/api/storage
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      qdrant:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - basjoo-network
    healthcheck:
      # Dify 1.14.2 setup endpoint 未登录返 401 = healthy
      test: ["CMD", "curl", "-f", "http://localhost:5001/console/api/setup"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

networks:
  basjoo-network:
    driver: bridge

volumes:
  redis-data:
  postgres-data:
  backend-data:
  qdrant-data:
  dify-data:
